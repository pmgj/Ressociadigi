<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org">

<head>
    <title>Mostrando Dados</title>
    <meta charset="UTF-8" />
</head>

<body>
    <table>
        <caption>Banco de Talentos</caption>
        <thead>
            <tr>
                <th><a th:href="@{/inserirApenadoForm}">Incluir</a></th>
                <th>CPF</th>
                <th>Nome</th>
                <th>Data de Nascimento</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${lista.empty}">
                <td colspan="4">Nenhum registro armazenado.</td>
            </tr>
            <tr th:each="item : ${lista}">
                <td>
                    <a th:href="@{/alterarApenadoForm(cpf=${item.cpf})}">Atualizar</a>
                    <a th:href="@{/removerApenado(cpf=${item.cpf})}">Remover</a>
                </td>
                <td><span th:text="${item.cpf}">CPF</span></td>
                <td><span th:text="${item.nome}">Nome</span></td>
                <td><span th:text="${item.dataNascimento}">Data de Nascimento</span></td>
            </tr>
        </tbody>
    </table>
</body>

</html>
